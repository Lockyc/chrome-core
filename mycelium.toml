name    = "chrome-core"
summary = "The shared sidebar UI for the warden, curator, and lector apps — the grouped tab rows, resize-drag and density styling, written once as framework-free CSS + vanilla JS the apps embed at build time."
kind    = "library"
status  = "active"
tags    = ["sidebar", "ui", "shared-core", "tauri", "macos"]
stack   = ["rust", "css", "javascript"]

[[provides]]
name    = "sidebar-chrome"
summary = "The ChromeSidebar view — banner + accent tint, grouped tab rows (letter tile, title, status/action dot slots), kill-confirm overlay, density tokens, resize-drag, error bar. Each app supplies a normalized tab DTO plus callbacks."

[[provides]]
name    = "self-update"
summary = "App-agnostic self-update owned here, not per-app: check cadence, update bar, install/relaunch. A consuming app supplies only its updater identity (endpoint/pubkey) — config, not logic."

[[provides]]
name    = "app-name-strip"
summary = "The appName mount-config field: a title-bar strip beside the macOS traffic lights naming the host app, since every consumer hides the native window title (TitleBarStyle::Overlay). Owns the traffic-light inset outright — a consumer passing appName drops its own padding-top, removing a magic-number duplication each app used to carry."
