name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No rust-toolchain.toml in this repo — the runner's preinstalled stable
      # toolchain is used as-is, matching the local `just gate` loop.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: fmt check
        run: cargo fmt --check

      - name: js unit tests
        run: node --test

      - name: build (compiles the include_str! asset constants)
        run: cargo build
